compatibility_date = "2025-10-08"
main = "src/index.ts"
name = "pr-bot"
upload_source_maps = true

[observability]
enabled = true

[[queues.producers]]
binding = "REVIEW_QUEUE"
queue = "pr-bot-review"

[[queues.consumers]]
queue = "pr-bot-review"
max_batch_size = 1
max_batch_timeout = 5

[[kv_namespaces]]
binding = "REVIEW_STATE"
id = "replace_with_production_kv_namespace_id"
preview_id = "replace_with_preview_kv_namespace_id"
